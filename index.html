<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Tirta Kencana — POS</title>
<meta name="theme-color" content="#00509E">
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/tokens.css">
<link rel="stylesheet" href="css/layout.css">

<body>
<div id="app">
  <div class="center-screen"><div class="spinner" style="width:32px;height:32px;border-width:4px"></div></div>
</div>
<script type="module" src="js/app.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    // Service worker HANYA menyimpan file tampilan (HTML/CSS/JS/ikon) agar
    // app cepat dibuka lagi — TIDAK PERNAH menyimpan data transaksi/produk/
    // pelanggan. Semua data selalu diambil langsung dari server.
    window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(() => {}));
  }
</script>
</body>
</html>
